name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy requests urllib3 certifi

      - name: Build with Buildozer
        run: |
          # အရင်ကကျန်ခဲ့သော အမှားဟောင်းများကို အကုန်ရှင်းထုတ်ရန်
          rm -rf .buildozer/
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          # License error မတက်စေရန်နှင့် Build ချောမွေ့စေရန်
          yes | buildozer -v android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RuijieTurbo-APK
          path: bin/*.apk
