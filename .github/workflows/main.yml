name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Java 17 ကို အသုံးပြုခြင်း (Gradle Compatibility အတွက်)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy requests urllib3 certifi

      - name: Build with Buildozer
        run: |
          # ၁။ အရင်ကကျန်ခဲ့သော Error အဟောင်းများကို အမြစ်ပြတ်ရှင်းထုတ်ရန်
          rm -rf .buildozer/
          
          # ၂။ Android SDK config ဖန်တီးရန်
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          
          # ၃။ Broken pipe မဖြစ်စေရန် buildozer ကို တိုက်ရိုက် run ခြင်း
          # (.spec ဖိုင်တွင် android.accept_sdk_license = True ထည့်ထားရန် လိုသည်)
          buildozer -v android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RuijieTurbo-APK
          path: bin/*.apk
