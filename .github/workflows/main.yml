name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      - name: Build with Buildozer
        run: |
          # Android SDK licenses တွေကို အလိုအလျောက် အတည်ပြုရန်
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          # Buildozer ကို run ရန် (yes က license အားလုံးကို အလိုအလျောက် OK နှိပ်ပေးပါလိမ့်မည်)
          yes | buildozer -v android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RuijieTurbo-APK
          path: bin/*.apk
